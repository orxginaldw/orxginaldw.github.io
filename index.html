<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binwoken</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0c0c0f 0%, #070709 100%);
            color: #f6f7fb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            padding: 0;
        }

        .header {
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: blur(6px);
            padding: 16px 34px;
            border-bottom: 1px solid #24242c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
            letter-spacing: 0.8px;
            text-shadow: 0 0 16px rgba(255, 255, 255, 0.2);
        }


        .auth-links {
            display: none;
        }

        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 34px 26px 50px;
            text-align: center;
        }

        .logo-large {
            display: none;
        }

        .logo-large svg {
            width: 100%;
            height: 100%;
            filter: brightness(0.95);
        }

        .links-section {
            margin: 8px 0 26px;
            padding: 14px 18px;
            border: 1px solid #2a2a34;
            border-radius: 12px;
            background: rgba(17, 17, 22, 0.72);
        }

        .links-section a {
            color: #8cc4ff;
            text-decoration: underline;
            margin: 0 8px;
            font-weight: 600;
            transition: color 0.2s ease, text-shadow 0.2s ease, transform 0.2s ease;
            display: inline-block;
        }

        .links-section a:hover {
            color: #c2e0ff;
            text-shadow: 0 0 10px rgba(140, 196, 255, 0.35);
            transform: translateY(-1px);
        }

        .links-section a.green {
            color: #00ff00;
        }

        .links-section a.red {
            color: #ff0000;
        }

        .search-section {
            margin: 22px 0;
        }

        .search-section h2 {
            color: #e7e9ef;
            margin-bottom: 13px;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif;
        }

        .search-box {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
            justify-content: center;
        }

        .search-input {
            flex: 1;
            padding: 12px 15px;
            background: #11131a;
            border: 1px solid #2f3444;
            color: #ffffff;
            font-size: 14px;
            border-radius: 8px;
            font-family: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif;
            font-weight: 500;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
        }

        .search-input::placeholder {
            color: #666666;
        }

        .search-input:hover {
            border-color: #46506b;
            background: #141722;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
        }

        .search-input:focus {
            outline: none;
            border-color: #5b6a8f;
            box-shadow: 0 0 0 2px rgba(91, 106, 143, 0.22), 0 10px 22px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        .search-button {
            padding: 12px 22px;
            background: #11131a;
            border: 1px solid #2f3444;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif;
        }

        .search-button:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
        }

        .patch-count {
            color: #d5d8e3;
            margin: 20px 0;
            font-size: 14px;
            font-weight: 600;
        }


        .table-container {
            margin: 24px 0;
            text-align: left;
            border: 1px solid #2a2f3e;
            border-radius: 14px;
            background: rgba(10, 11, 16, 0.86);
            overflow: hidden;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.4);
        }

        .table-title {
            color: #ffffff;
            font-size: 19px;
            margin-bottom: 0;
            padding: 16px 16px 8px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }

        th {
            padding: 12px;
            text-align: left;
            color: #ffffff;
            border-bottom: 1px solid #2a2f3e;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.03);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #1f2430;
        }

        tr:hover {
            opacity: 0.9;
        }

        tr.row-yellow {
            background: #2f2b0e;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
        }

        tr.row-red {
            background: #2f1013;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
        }

        tr.row-blue {
            background: #101a33;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
        }

        tr.row-yellow:hover,
        tr.row-red:hover,
        tr.row-blue:hover {
            filter: brightness(1.15);
            transform: translateY(-2px) scale(1.004);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
        }

        .title-link {
            color: #ffffff;
            text-decoration: underline;
        }

        .creator-link {
            color: #ffffff;
            text-decoration: underline;
        }

        tr.row-yellow .title-link,
        tr.row-yellow .creator-link,
        tr.row-yellow td {
            color: #ffff00;
        }

        tr.row-red .title-link,
        tr.row-red .creator-link,
        tr.row-red td {
            color: #ffcccc;
        }

        tr.row-blue .title-link,
        tr.row-blue .creator-link,
        tr.row-blue td {
            color: #ccccff;
        }

    </style>
</head>

    </div>
