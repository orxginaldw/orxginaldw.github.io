name = "binwoken"
main = "index.js"
compatibility_date = "2026-04-01"
compatibility_flags = [ "nodejs_compat" ]

[[d1_databases]]
binding = "DB"
database_name = "binwoken"
database_id = "31f18fcd-376a-4d79-a94c-6300aca38a61"

[[r2_buckets]]
binding = "CHIME_MATCHES"
bucket_name = "chime-matches"

[assets]
directory = "./assets"
binding = "ASSETS"

[triggers]
crons = ["*/3 * * * *"]
