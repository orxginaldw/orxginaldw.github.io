<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binwoken</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <div class="noise"></div>
  <header class="bezel-header">
    <div class="notice rose">If you want your stuff posted here, join the Discord or DM.</div>
    <div class="notice amber">Support by joining the Discord.</div>
    <div class="head-row">
      <div class="brand">Binwoken</div>
      <nav class="chips">
        <button type="button" class="chip" id="serverFinderOpen">Server Finder</button>
        <a class="chip" href="https://github.com/orxginaldw/orxginaldw.github.io/" target="_blank">GitHub</a>
        <a class="chip" href="https://discord.gg/RzGnytNDRR" target="_blank">Discord</a>
      </nav>
    </div>
  </header>
  <main class="page">
    <p class="count">Showing <b id="countNow">0</b> (of <b id="countAll">0</b> total) patches</p>
    <div class="toolbar">
      <input class="search" id="q" type="text" placeholder="Search by title or creator">
    </div>
    <section id="grid" class="grid"></section>
  </main>
  <div id="modal" class="modal" aria-hidden="true">
    <div id="backdrop" class="backdrop"></div>
    <div class="panel" role="dialog" aria-modal="true" aria-labelledby="mTitle">
      <button id="close" class="close" type="button" aria-label="Close"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6L18 18M18 6L6 18"/></svg></button>
      <div class="kicker">Patch</div>
      <h2 id="mTitle" class="m-title"></h2>
      <p id="mMeta" class="m-meta"></p>
      <p id="mDlCount" class="m-dlcount" hidden></p>
      <div id="mPreviewWrap" class="preview" hidden><div class="kicker">Preview</div><img id="mPreview" alt=""></div>
      <div class="kicker">Description</div>
      <p id="mDesc" class="desc"></p>
      <button id="mDownload" class="btn" type="button">Download</button>
    </div>
  </div>
  <div id="serverFinderModal" class="modal" aria-hidden="true">
    <div id="serverFinderBackdrop" class="backdrop"></div>
    <div class="panel sf-panel" role="dialog" aria-modal="true" aria-labelledby="sfTitle">
      <button id="serverFinderClose" class="close" type="button" aria-label="Close"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6L18 18M18 6L6 18"/></svg></button>
      <div class="kicker">Lookup</div>
      <h2 id="sfTitle" class="m-title">Server Finder</h2>
      <label class="sf-label" for="sfUserId">Roblox User ID</label>
      <input class="search sf-input" id="sfUserId" type="text" placeholder="Enter user ID" autocomplete="off" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <div class="sf-captcha-wrap">
        <div class="sf-captcha-custom" id="sfCaptchaRow">
          <button type="button" id="sfCaptchaTrigger" class="sf-captcha-trigger g-recaptcha" aria-label="Verify you are not a robot" data-sitekey="6Ld2FrksAAAAAIMPagRQ4cpWlkpriNSBK2Ejv4ZC" data-size="invisible" data-badge="bottomright" data-callback="onCaptchaPass" data-expired-callback="onCaptchaReset" data-error-callback="onCaptchaError">
            <span class="sf-captcha-box" aria-hidden="true"></span>
            <span class="sf-captcha-label">I'm not a robot</span>
          </button>
        </div>
        <p class="sf-captcha-legal">Protected by reCAPTCHA. Google <a href="https://policies.google.com/privacy" target="_blank" rel="noreferrer">Privacy</a> and <a href="https://policies.google.com/terms" target="_blank" rel="noreferrer">Terms</a> apply.</p>
      </div>
      <button type="button" class="btn sf-search" id="sfSearch" disabled>Search</button>
      <p id="sfResult" class="m-meta"></p>
    </div>
  </div>
  <script>
    const files=[
      {trackId:"pistachio_cream_menu",type:"zip",title:"Pistachio Cream Menu",creator:"orxginaldw",added:"Apr 4th, 2026",description:"Modified version with the license check removed. In its current state most features barely work or are outright broken, the UI is the only reason its considered good.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/PCM_PATCH.zip",downloadName:"PCM_PATCH.zip",previewImage:"images/pistachiocreammenu.png"},
      {trackId:"pistachio_cream_menu_source",type:"zip",title:"Pistachio Cream Menu Source",creator:"orxginaldw",added:"Apr 4th, 2026",description:"Full Pistachio Cream Menu source code, untouched and unpatched.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/PCM_SOURCE.zip",downloadName:"PCM_SOURCE.zip",previewImage:"images/pistachiocreammenu.png"},
      {trackId:"lycoris_auto_parry_timings",type:"json",title:"Lycoris Auto-Parry Timings",creator:"orxginaldw",added:"Apr 3rd, 2026",description:"These are dumped auto-parry timings from <a href='https://github.com/Blastbrean/Lycoris-Rewrite/' target='_blank' rel='noreferrer'>Lycoris-Rewrite</a> via syncing workspace timing data and merging patch diffs into one timings file.",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/timings.json",downloadName:"timings.json"},
      {trackId:"merostrap",type:"zip",title:"Merostrap1.6.4.zip",creator:"orxginaldw",added:"Mar 29th, 2026",description:"Leaked Merostrap file. Context: <a href='https://www.tiktok.com/@akytoq' target='_blank' rel='noreferrer'>akyto</a> was selling a Frostrap reskin for $25.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/Merostrap1.6.4.zip",downloadName:"",isLink:true,previewImage:"images/merostrap.png"},
      {trackId:"lightningreflexes",type:"ahk",title:"lightningreflexes.ahk",creator:"YunisMink",added:"Dec 8th, 2025",description:"Press F during M1 to feint.",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/lightningreflexes.ahk",downloadName:"lightningreflexes.ahk"},
      {trackId:"evil_macro",type:"zip",title:"evil_macro.zip",creator:"_desov",added:"Sep 16th, 2025",description:"AutoHotkey macro with hold-M1, green reinforce, golden tongue, and roll-parry macros.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/evil_macro.zip",downloadName:"evil_macro.zip",previewImage:"images/evilmacro.png"},
      {trackId:"mimos_macro",type:"ahk",title:"mimo's macro.ahk",creator:"gucc1fly",added:"Sep 14th, 2025",description:"AutoHotkey macro by former Godseeker gucc1fly (also known as mimo or maciek_cink), with hold-M1 and golden tongue macros.",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/mimo%27s%20macro.ahk",downloadName:"mimo's macro.ahk"},
      {trackId:"spamclick",type:"exe",title:"spamclick.exe",creator:"grap",added:"Sep 13th, 2025",description:"Compiled AutoHotkey hold-M1 macro by former Godseeker grap. If it asks for a password, enter anything (for example, 1) and keep submitting until the popup closes.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/spamclick.exe",downloadName:"spamclick.exe"},
      {trackId:"spamclick_decompiled",type:"ahk",title:"spamclick-decompiled.ahk",creator:"orxginaldw",added:"Sep 13th, 2025",description:"Source code for spamclick.exe.",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/spamclick-decompiled.ahk",downloadName:"spamclick-decompiled.ahk"},
      {trackId:"gold_menu",type:"zip",title:"gold-menu-decompiled.zip",creator:"orxginaldw",added:"Sep 6th, 2025",description:"Python source code for a Deepwoken macro menu that bundles many macros from the creator's public uploads.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/gold_menu_decompiled.zip",downloadName:"gold_menu_decompiled.zip",previewImage:"images/goldmenu.png"},
      {trackId:"akai_exe",type:"exe",title:"akai4.3.exe",creator:"pendant",added:"Sep 5th, 2025",description:"Popular AutoHotkey macro built for older Deepwoken UI; many macros no longer work as expected.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/Officer.zip",downloadName:"akai4.3.zip",previewImage:"images/akai.png"},
      {trackId:"akai_patched",type:"zip",title:"akai4.3-patched.zip",creator:"orxginaldw",added:"Sep 6th, 2025",description:"Bypasses the Akai 4.3 license check.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/Officer-patched.zip",downloadName:"Officer-patched.zip",previewImage:"images/akai.png"},
      {trackId:"akai_decompiled",type:"zip",title:"akai4.3-decompiled.zip",creator:"orxginaldw",added:"Sep 6th, 2025",description:"Full Akai 4.3 source code, untouched and unpatched.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/Officer-decompiled.zip",downloadName:"Officer-decompiled.zip",previewImage:"images/akai.png"},
      {trackId:"client_appsettings",type:"json",title:"ClientAppSettings.json",creator:"reddice",added:"Sep 6th, 2025",description:"Leaked fflags from a Godseeker known as mervonz, or so I was told (slightly edited by me and reddice).",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/ClientAppSettings.json",downloadName:"ClientAppSettings.json"},
      {trackId:"hamsternal_decompiled",type:"lua",title:"HamsternalDecompiled.lua, Deprecated",creator:"orxginaldw",added:"Apr 2nd, 2026",description:"Hamsternal's Deepwoken plugin script, decompiled from version 1.0.7. I discontinued decompiling further versions because I have made up with the owners. Obfuscation method is repeating-key XOR.",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/main.lua",downloadName:"main.lua"},
      {trackId:"hamsternal_patched",type:"zip",title:"HamsternalPatch.zip, Deprecated",creator:"orxginaldw",added:"Mar 19th, 2026",description:"Hamsternal is a Deepwoken external with features like voiding mobs, no fall, fly, and a Lua scripting API, and it costs about $5. This zip includes a program that downloads the latest version, launches it with a bypassed whitelist, and lets you use it for free. If this gets patched, I will stop cracking it because I have made up with the owners.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/HamsternalPatch.zip",downloadName:"",isLink:true,previewImage:"images/hamsternal.png"},
      {trackId:"evolution",type:"zip",title:"evolution.zip, Deprecated",creator:"orxginaldw",added:"Sep 18th, 2025",description:"AutoHotkey macro with a C++ ImGui backend that bundles public macros from popular YouTubers and Godseekers into one open-source menu. It also has OCR profile switching that auto-detects character slots for different build settings. This project is discontinued.",downloadUrl:"https://www.evolutionary.site/",downloadName:"",isLink:true,previewImage:"images/evolution.png"},
      {trackId:"astral",type:"zip",title:"astral_client.zip, Deprecated",creator:"orxginaldw",added:"Aug 11th, 2025",description:"Formerly known as Kintama Macro, now rebranded as Astral Client. It was known for a build stealer and a username-based server finder. The build stealer could capture pre-shrine and post-shrine stats, talents, and oath into a deepwoken.co/builder link, while the server finder could locate a target's server and luminant from the main menu. This project is discontinued.",downloadUrl:"https://astralclient.cc",downloadName:"",isLink:true,previewImage:"images/astralclient.png"}
    ];
    const grid=document.getElementById("grid"),q=document.getElementById("q"),countNow=document.getElementById("countNow"),countAll=document.getElementById("countAll");
    const modal=document.getElementById("modal"),backdrop=document.getElementById("backdrop"),closeBtn=document.getElementById("close"),mTitle=document.getElementById("mTitle"),mMeta=document.getElementById("mMeta"),mDlCount=document.getElementById("mDlCount"),mDesc=document.getElementById("mDesc"),mPreviewWrap=document.getElementById("mPreviewWrap"),mPreview=document.getElementById("mPreview"),mDownload=document.getElementById("mDownload");
    const serverFinderModal=document.getElementById("serverFinderModal"),serverFinderBackdrop=document.getElementById("serverFinderBackdrop"),serverFinderOpen=document.getElementById("serverFinderOpen"),serverFinderClose=document.getElementById("serverFinderClose"),sfUserId=document.getElementById("sfUserId"),sfSearch=document.getElementById("sfSearch"),sfResult=document.getElementById("sfResult"),sfCaptchaRow=document.getElementById("sfCaptchaRow"),sfCaptchaTrigger=document.getElementById("sfCaptchaTrigger");
    let active=null,visibleList=files,countsMap={},sfCaptchaToken="";
    const setSearchEnabled=v=>{sfSearch.disabled=!v;};
    const resetCaptcha=()=>{sfCaptchaToken="";setSearchEnabled(false);if(sfCaptchaRow)sfCaptchaRow.classList.remove("sf-captcha-custom--verified");if(window.grecaptcha){try{grecaptcha.reset();}catch{}}};
    window.onCaptchaPass=token=>{sfCaptchaToken=String(token||"").trim();setSearchEnabled(!!sfCaptchaToken);if(sfCaptchaRow&&sfCaptchaToken)sfCaptchaRow.classList.add("sf-captcha-custom--verified");};
    window.onCaptchaReset=()=>{sfCaptchaToken="";setSearchEnabled(false);if(sfCaptchaRow)sfCaptchaRow.classList.remove("sf-captcha-custom--verified");};
    window.onCaptchaError=()=>{sfCaptchaToken="";setSearchEnabled(false);if(sfCaptchaRow)sfCaptchaRow.classList.remove("sf-captcha-custom--verified");};
    const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    const ext=f=>f.type;
    const dlCountLabel=n=>{const x=n==null||n===""?0:Number(n);const v=Number.isFinite(x)?x:0;return v===1?"1 download":`${v} downloads`;};
    const LS_TRACK="count";
    const tracked=(()=>{try{const j=localStorage.getItem(LS_TRACK);const a=j?JSON.parse(j):[];return new Set(Array.isArray(a)?a:[]);}catch{return new Set();}})();
    const saveTracked=()=>{try{localStorage.setItem(LS_TRACK,JSON.stringify([...tracked]));}catch{}};
    const dlAnchor=(href,name)=>{const a=document.createElement("a");a.href=href;if(name)a.download=name;a.style.display="none";document.body.appendChild(a);a.click();a.remove();};
    const dl=async f=>{
      if(f.trackId&&!tracked.has(f.trackId)){
        try{
          const r=await fetch("/api/track",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:f.trackId})});
          if(r.ok){
            const j=await r.json();
            countsMap[f.trackId]=j.count;
            tracked.add(f.trackId);
            saveTracked();
            if(active&&active.trackId===f.trackId){mDlCount.textContent=dlCountLabel(j.count);}
            render(visibleList);
          }
        }catch{}
      }
      if(f.isLink){window.open(f.downloadUrl,"_blank");return;}
      let useBlob=false;
      try{useBlob=new URL(f.downloadUrl,location.origin).hostname==="raw.githubusercontent.com";}catch{}
      if(useBlob){
        try{
          const r=await fetch(f.downloadUrl);
          if(r.ok){
            const b=await r.blob();
            const u=URL.createObjectURL(b);
            dlAnchor(u,f.downloadName||f.title.split(",")[0].trim());
            setTimeout(()=>URL.revokeObjectURL(u),1440);
            return;
          }
        }catch{}
      }
      dlAnchor(f.downloadUrl,f.downloadName);
    };
    const closeModal=()=>{active=null;modal.classList.remove("open");modal.setAttribute("aria-hidden","true");document.body.classList.remove("modal-open");};
    const openServerFinderModal=()=>{serverFinderModal.classList.add("open");serverFinderModal.setAttribute("aria-hidden","false");document.body.classList.add("modal-open");sfResult.textContent="";resetCaptcha();sfUserId.focus();};
    const closeServerFinderModal=()=>{serverFinderModal.classList.remove("open");serverFinderModal.setAttribute("aria-hidden","true");document.body.classList.remove("modal-open");};
    const callServerFinder=async()=>{if(sfSearch.disabled)return;const userId=sfUserId.value.trim();if(!userId){sfResult.textContent="Enter user ID.";return;}const token=sfCaptchaToken;if(!token){sfResult.textContent="Complete captcha.";resetCaptcha();return;}sfResult.textContent="Searching...";setSearchEnabled(false);try{const r=await fetch("/api/find",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId,token})});if(!r.ok){sfResult.textContent="Search failed.";resetCaptcha();return;}const j=await r.json();resetCaptcha();if(j&&j.code===0){sfResult.textContent=`jobId: ${j.jobId} | placeId: ${j.placeId}`;return;}sfResult.textContent="Not found.";}catch{resetCaptcha();sfResult.textContent="Search failed.";}}
    const openModal=f=>{active=f;mTitle.textContent=f.title;mMeta.textContent=`Created by ${f.creator} • Added ${f.added}`;if(f.trackId){const n=countsMap[f.trackId];mDlCount.hidden=false;mDlCount.textContent=dlCountLabel(n);}else{mDlCount.hidden=true;}mDesc.innerHTML=(f.description||"").trim();if(f.previewImage){mPreview.src=f.previewImage;mPreviewWrap.hidden=false;}else{mPreviewWrap.hidden=true;mPreview.removeAttribute("src");}modal.classList.add("open");modal.setAttribute("aria-hidden","false");document.body.classList.add("modal-open");};
    function render(list){visibleList=list;grid.innerHTML="";list.forEach(f=>{const c=document.createElement("article");c.className="card";const dc=f.trackId!=null?countsMap[f.trackId]:null;const dline=f.trackId!=null?`<p class="meta dl-line">${esc(dlCountLabel(dc))}</p>`:"";c.innerHTML=`<div class="kind">.${ext(f)}</div><h3 class="title">${esc(f.title)}</h3><p class="meta">by ${esc(f.creator)}</p><p class="meta">added ${esc(f.added)}</p>${dline}<button type="button" class="btn">Download</button>`;c.addEventListener("click",()=>openModal(f));c.querySelector(".btn").addEventListener("click",e=>{e.stopPropagation();dl(f);});grid.appendChild(c);});countNow.textContent=list.length;countAll.textContent=files.length;}
    q.addEventListener("input",()=>{const s=q.value.trim().toLowerCase();render(!s?files:files.filter(f=>f.title.toLowerCase().includes(s)||f.creator.toLowerCase().includes(s)));});
    mDownload.addEventListener("click",()=>{if(active)dl(active);});
    backdrop.addEventListener("click",closeModal);
    closeBtn.addEventListener("click",closeModal);
    serverFinderOpen.addEventListener("click",openServerFinderModal);
    serverFinderBackdrop.addEventListener("click",closeServerFinderModal);
    serverFinderClose.addEventListener("click",closeServerFinderModal);
    sfSearch.addEventListener("click",callServerFinder);
    sfCaptchaTrigger.addEventListener("click",()=>{if(window.grecaptcha)return;});
    sfUserId.addEventListener("keydown",e=>{if(e.key==="Enter")callServerFinder();});
    document.addEventListener("keydown",e=>{if(e.key!=="Escape")return;if(serverFinderModal.classList.contains("open")){closeServerFinderModal();return;}if(modal.classList.contains("open"))closeModal();});
    async function loadCounts(){try{const r=await fetch("/api/counts");if(r.ok)countsMap=await r.json();}catch{countsMap={}}render(visibleList);if(active&&active.trackId){mDlCount.hidden=false;mDlCount.textContent=dlCountLabel(countsMap[active.trackId]);}}
    render(files);
    loadCounts();
  </script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</body>
</html>
