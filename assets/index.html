<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binwoken</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <div class="noise"></div>
  <header class="bezel-header">
    <div class="notice rose">If you want your stuff posted here, join the Discord or DM.</div>
    <div class="notice amber">Support by joining the Discord.</div>
    <div class="head-row">
      <div class="brand">Binwoken</div>
      <nav class="chips">
        <a class="chip" href="https://discord.gg/RzGnytNDRR" target="_blank">Discord</a>
        <a class="chip" href="https://binwoken.sh/" target="_blank">binwoken.sh</a>
        <a class="chip" href="https://github.com/orxginaldw/orxginaldw.github.io/" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>
  <main class="page">
    <p class="count">Showing <b id="countNow">0</b> (of <b id="countAll">0</b> total) patches</p>
    <div class="toolbar">
      <input class="search" id="q" type="text" placeholder="Search by title or creator">
    </div>
    <section id="grid" class="grid"></section>
  </main>
  <div id="modal" class="modal" aria-hidden="true">
    <div id="backdrop" class="backdrop"></div>
    <div class="panel" role="dialog" aria-modal="true" aria-labelledby="mTitle">
      <button id="close" class="close" type="button" aria-label="Close"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6L18 18M18 6L6 18"/></svg></button>
      <div class="kicker">Patch</div>
      <h2 id="mTitle" class="m-title"></h2>
      <p id="mMeta" class="m-meta"></p>
      <p id="mDlCount" class="m-dlcount" hidden></p>
      <div id="mPreviewWrap" class="preview" hidden><div class="kicker">Preview</div><img id="mPreview" alt=""></div>
      <div class="kicker">Description</div>
      <p id="mDesc" class="desc"></p>
      <button id="mDownload" class="btn" type="button">Download</button>
    </div>
  </div>
  <script>
    const files=[
      {trackId:"merostrap",title:"Merostrap1.6.4.zip",creator:"orxginaldw",added:"Mar 29th, 2026",description:"Leaked Merostrap file. Context: <a href='https://www.tiktok.com/@akytoq' target='_blank' rel='noreferrer'>akyto</a> was selling a Frostrap reskin for $25.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/Merostrap1.6.4.zip",downloadName:"",isLink:true,previewImage:"images/merostrap.png"},
      {trackId:"lightningreflexes",title:"lightningreflexes.ahk",creator:"YunisMink",added:"Dec 8th, 2025",description:"Press F during M1 to feint.",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/lightningreflexes.ahk",downloadName:"lightningreflexes.ahk"},
      {trackId:"evil_macro",title:"evil_macro.zip",creator:"_desov",added:"Sep 16th, 2025",description:"AutoHotkey macro with hold-M1, green reinforce, golden tongue, and roll-parry macros.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/evil_macro.zip",downloadName:"evil_macro.zip",previewImage:"images/evilmacro.png"},
      {trackId:"mimos_macro",title:"mimo's-macro.ahk",creator:"gucc1fly",added:"Sep 14th, 2025",description:"AutoHotkey macro by former Godseeker gucc1fly (also known as mimo or maciek_cink), with hold-M1 and golden tongue macros.",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/mimo%27s%20macro.ahk",downloadName:"mimo's macro.ahk"},
      {trackId:"spamclick",title:"spamclick.exe",creator:"grap",added:"Sep 13th, 2025",description:"Compiled AutoHotkey hold-M1 macro by former Godseeker grap. If it asks for a password, enter anything (for example, 1) and keep submitting until the popup closes.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/spamclick.exe",downloadName:"spamclick.exe"},
      {trackId:"spamclick_decompiled",title:"spamclick-decompiled.ahk",creator:"orxginaldw",added:"Sep 13th, 2025",description:"Source code for spamclick.exe.",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/spamclick-decompiled.ahk",downloadName:"spamclick-decompiled.ahk"},
      {trackId:"gold_menu",title:"gold-menu-decompiled.zip",creator:"orxginaldw",added:"Sep 6th, 2025",description:"Python source code for a Deepwoken macro menu that bundles many macros from the creator's public uploads.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/gold_menu_decompiled.zip",downloadName:"gold_menu_decompiled.zip",previewImage:"images/goldmenu.png"},
      {trackId:"akai_exe",title:"akai4.3.exe",creator:"pendant",added:"Sep 5th, 2025",description:"Popular AutoHotkey macro built for older Deepwoken UI; many macros no longer work as expected.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/Officer.zip",downloadName:"akai4.3.zip",previewImage:"images/akai.png"},
      {trackId:"akai_patched",title:"akai4.3-patched.zip",creator:"orxginaldw",added:"Sep 6th, 2025",description:"Bypasses the Akai 4.3 license check.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/Officer-patched.zip",downloadName:"Officer-patched.zip",previewImage:"images/akai.png"},
      {trackId:"akai_decompiled",title:"akai4.3-decompiled.zip",creator:"orxginaldw",added:"Sep 6th, 2025",description:"Full Akai 4.3 source code, untouched and unpatched.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/Officer-decompiled.zip",downloadName:"Officer-decompiled.zip",previewImage:"images/akai.png"},
      {trackId:"client_appsettings",title:"ClientAppSettings.json",creator:"reddice",added:"Sep 6th, 2025",description:"Leaked fflags from a Godseeker known as mervonz, or so I was told (slightly edited by me and reddice).",downloadUrl:"https://raw.githubusercontent.com/orxginaldw/orxginaldw.github.io/refs/heads/main/downloads/ClientAppSettings.json",downloadName:"ClientAppSettings.json"},
      {trackId:"hamsternal",title:"HamsternalPatch.zip, Deprecated",creator:"orxginaldw",added:"Mar 19th, 2026",description:"Hamsternal is a Deepwoken external with features like voiding mobs, no fall, fly, and a Lua scripting API, and it costs about $5. This zip includes a program that downloads the latest version, launches it with a bypassed whitelist, and lets you use it for free. If this gets patched, I will stop cracking it because I have made up with the owners.",downloadUrl:"https://github.com/orxginaldw/orxginaldw.github.io/raw/refs/heads/main/downloads/HamsternalPatch.zip",downloadName:"",isLink:true,previewImage:"images/hamsternal.png"},
      {trackId:"evolution",title:"evolution.zip, Deprecated",creator:"orxginaldw",added:"Sep 18th, 2025",description:"AutoHotkey macro with a C++ ImGui backend that bundles public macros from popular YouTubers and Godseekers into one open-source menu. It also has OCR profile switching that auto-detects character slots for different build settings. This project is discontinued.",downloadUrl:"https://www.evolutionary.site/",downloadName:"",isLink:true,previewImage:"images/evolution.png"},
      {trackId:"astral",title:"astral_client.zip, Deprecated",creator:"orxginaldw",added:"Aug 11th, 2025",description:"Formerly known as Kintama Macro, now rebranded as Astral Client. It was known for a build stealer and a username-based server finder. The build stealer could capture pre-shrine and post-shrine stats, talents, and oath into a deepwoken.co/builder link, while the server finder could locate a target's server and luminant from the main menu. This project is discontinued.",downloadUrl:"https://astralclient.cc",downloadName:"",isLink:true,previewImage:"images/astralclient.png"}
    ];
    const grid=document.getElementById("grid"),q=document.getElementById("q"),countNow=document.getElementById("countNow"),countAll=document.getElementById("countAll");
    const modal=document.getElementById("modal"),backdrop=document.getElementById("backdrop"),closeBtn=document.getElementById("close"),mTitle=document.getElementById("mTitle"),mMeta=document.getElementById("mMeta"),mDlCount=document.getElementById("mDlCount"),mDesc=document.getElementById("mDesc"),mPreviewWrap=document.getElementById("mPreviewWrap"),mPreview=document.getElementById("mPreview"),mDownload=document.getElementById("mDownload");
    let active=null,visibleList=files,countsMap={};
    const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    const ext=t=>(String(t).split(",")[0].trim().match(/\.([a-z0-9]+)$/i)||[])[1]?.toLowerCase()||"zip";
    const dlCountLabel=n=>{const x=n==null||n===""?0:Number(n);const v=Number.isFinite(x)?x:0;return v===1?"1 download":`${v} downloads`;};
    const dl=async f=>{if(f.trackId){try{const r=await fetch("/api/track",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:f.trackId})});if(r.ok){const j=await r.json();countsMap[f.trackId]=j.count;if(active&&active.trackId===f.trackId){mDlCount.textContent=dlCountLabel(j.count);}render(visibleList);}}catch{}}if(f.isLink){window.open(f.downloadUrl,"_blank");return;}const a=document.createElement("a");a.href=f.downloadUrl;if(f.downloadName)a.download=f.downloadName;a.style.display="none";document.body.appendChild(a);a.click();a.remove();};
    const closeModal=()=>{active=null;modal.classList.remove("open");modal.setAttribute("aria-hidden","true");document.body.classList.remove("modal-open");};
    const openModal=f=>{active=f;mTitle.textContent=f.title;mMeta.textContent=`Created by ${f.creator} • Added ${f.added}`;if(f.trackId){const n=countsMap[f.trackId];mDlCount.hidden=false;mDlCount.textContent=dlCountLabel(n);}else{mDlCount.hidden=true;}mDesc.innerHTML=(f.description||"").trim();if(f.previewImage){mPreview.src=f.previewImage;mPreviewWrap.hidden=false;}else{mPreviewWrap.hidden=true;mPreview.removeAttribute("src");}modal.classList.add("open");modal.setAttribute("aria-hidden","false");document.body.classList.add("modal-open");};
    function render(list){visibleList=list;grid.innerHTML="";list.forEach((f,i)=>{const c=document.createElement("article");c.className="card";c.style.animationDelay=`${Math.min(i,12)*22}ms`;const dc=f.trackId!=null?countsMap[f.trackId]:null;const dline=f.trackId!=null?`<p class="meta dl-line">${esc(dlCountLabel(dc))}</p>`:"";c.innerHTML=`<div class="kind">.${ext(f.title)}</div><h3 class="title">${esc(f.title)}</h3><p class="meta">by ${esc(f.creator)}</p><p class="meta">added ${esc(f.added)}</p>${dline}<button type="button" class="btn">Download</button>`;c.addEventListener("click",()=>openModal(f));c.querySelector(".btn").addEventListener("click",e=>{e.stopPropagation();dl(f);});grid.appendChild(c);});countNow.textContent=list.length;countAll.textContent=files.length;}
    q.addEventListener("input",()=>{const s=q.value.trim().toLowerCase();render(!s?files:files.filter(f=>f.title.toLowerCase().includes(s)||f.creator.toLowerCase().includes(s)));});
    mDownload.addEventListener("click",()=>{if(active)dl(active);});
    backdrop.addEventListener("click",closeModal);
    closeBtn.addEventListener("click",closeModal);
    document.addEventListener("keydown",e=>{if(e.key==="Escape"&&modal.classList.contains("open"))closeModal();});
    async function loadCounts(){try{const r=await fetch("/api/counts");if(r.ok)countsMap=await r.json();}catch{countsMap={}}render(visibleList);if(active&&active.trackId){mDlCount.hidden=false;mDlCount.textContent=dlCountLabel(countsMap[active.trackId]);}}
    render(files);
    loadCounts();
  </script>
</body>
</html>
